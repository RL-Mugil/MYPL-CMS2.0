<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metayage - Client Portal Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-bg {
      background: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(56,189,248,0.10), transparent),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(52,211,153,0.06), transparent);
    }
    .client-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(56,189,248,0.1); color: var(--sky);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark" style="background: linear-gradient(135deg,#0ea5e9,#34d399)">M</div>
        <div>
          <div class="firm-name">Metayage</div>
          <div class="firm-sub">IP &amp; Patent Services</div>
        </div>
      </div>

      <div class="client-badge">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="4"/></svg>
        Client Access
      </div>

      <div class="login-heading">Client Portal</div>
      <div class="login-sub">Access your patent cases, invoices, and documents.</div>

      <div id="clerk-sign-in"></div>

      <div id="login-status"></div>

      <div class="login-footer">
        Staff member? <a href="index.html">Staff login -&gt;</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
    (async () => {
      const status = document.getElementById('login-status');

      try {
        await Auth.initClerk();
        const session = await Auth.requireAuth(['Client', 'Admin', 'Attorney']);

        if (session) {
          status.textContent = 'Verifying account...';
          status.className = 'alert alert-info';

          if (session.role === 'Client') {
            window.location.href = 'client-portal.html';
          } else {
            window.location.href = 'dashboard.html';
          }
          return;
        }

        await Auth.mountSignIn('clerk-sign-in');
      } catch (e) {
        API.reportError('client-login-init', e);
        status.textContent = 'Connection error: ' + e.message;
        status.className = 'alert alert-error';
      }
    })();
  </script>
</body>
</html>
