<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metayage — Staff Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    .filter-drawer { display: none; }
    .filter-drawer.open { display: block; }
    .search-dropdown { position: relative; }
    .search-dropdown-shell { position: relative; }
    .search-dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 60;
      max-height: 220px;
      overflow-y: auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      display: none;
      padding: 6px;
    }
    .search-dropdown-menu.open { display: block; }
    .search-dropdown-option {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      display: block;
      font: inherit;
    }
    .search-dropdown-option:hover,
    .search-dropdown-option.active { background: rgba(122, 107, 255, 0.16); }
    .search-dropdown-empty {
      padding: 10px 12px;
      color: var(--text-2);
      font-size: 12px;
    }
    .chat-list { max-height: calc(100vh - 320px); overflow-y: auto; padding-right: 4px; }
    .inbox-panel { display: flex; flex-direction: column; min-height: 560px; max-height: calc(100vh - 180px); }
    .chat-thread { flex: 1; min-height: 260px; overflow-y: auto; padding-right: 6px; }
  </style>
</head>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script>
// ── Globals ──────────────────────────────────────────────────────────────────
let SESSION = null;
let _charts = {};
let DASHBOARD_FILTERS = { clientCode: '', caseId: '', fromDate: '', toDate: '' };
let CASE_FILTERS = { clientCode: '', caseId: '', status: '', country: '', workflowStage: '', query: '', sortDir: 'az' };
let GALVANIZER_FILTERS = { clientCode: '', caseId: '', workflowStage: '', query: '', sortDir: 'az' };
let USER_FILTERS = { query: '', role: '', sortDir: 'az' };
let MGMT_CLIENT_FILTERS = { query: '', orgId: '', sortDir: 'az' };
let MGMT_ORG_FILTERS = { query: '', sortDir: 'az' };
let TASK_FILTERS = { query: '', status: '', sortDir: 'az' };
let APPROVAL_FILTERS = { query: '', status: '', type: '', sortDir: 'az' };
let EXPENSE_FILTERS = { period: 'month', fromDate: '', toDate: '', sortDir: 'az' };
let FINANCE_FILTERS = { clientCode: '', query: '', sortDir: 'az' };
let CASES_PAGE_LIMIT = 50;
let CASES_PAGE_OFFSET = 0;
let CASES_HAS_MORE = false;
let CASES_TOTAL = 0;
let CASES_ITEMS = [];
let USERS_PAGE_LIMIT = 50;
let USERS_VISIBLE_COUNT = 50;
let CLIENTS_PAGE_LIMIT = 50;
let CLIENTS_VISIBLE_COUNT = 50;
let MESSAGES_PAGE_LIMIT = 25;
let MESSAGES_VISIBLE_COUNT = 25;
let NOTICES_PAGE_LIMIT = 25;
let NOTICES_VISIBLE_COUNT = 25;
let SAFE_PREFETCH_STARTED = false;
let CURRENT_THEME = 'dark';
let CURRENT_PAGE = 'dashboard';
let CASE_FILTER_TARGET = 'cases';
let CASE_MODAL_RETURN_PAGE = 'cases';
let CASE_IMPORT_STATE = { parsedRows: [], importableRows: [], skippedRows: [], fileName: '' };
let FINANCE_INVOICES_CACHE = [];
const NAV_SECTION_STORAGE_KEY = 'mg_sidebar_sections_v1';
const SIDEBAR_COLLAPSED_STORAGE_KEY = 'mg_sidebar_collapsed_v1';
const FILTER_PANEL_STATE = {
  cases: false,
  finance: false,
  galvanizer: false,
  tasks: false,
  approvals: false,
  mgmtUsers: false,
  mgmtClients: false,
  mgmtOrganizations: false,
  expenses: false,
};

function hasRoleAtLeast(role, minimumRole) {
  const order = {
    'Super Admin': 60,
    'Admin': 50,
    'Galvanizer': 45,
    'Staff': 40,
    'Attorney': 30,
    'Client Admin': 20,
    'Client Employee': 15,
    'Individual Client': 10,
  };
  if (Array.isArray(role)) {
    return role.some((item) => (order[item] || 0) >= (order[minimumRole] || 0));
  }
  return (order[role] || 0) >= (order[minimumRole] || 0);
}

function getEffectiveSessionRoles() {
  const roles = [];
  if (SESSION?.role) roles.push(SESSION.role);
  String(SESSION?.additionalRoles || '')
    .split(',')
    .map((value) => value.trim())
    .filter(Boolean)
    .forEach((role) => {
      if (!roles.includes(role)) roles.push(role);
    });
  return roles;
}

function sessionHasRoleAtLeast(minimumRole) {
  return hasRoleAtLeast(getEffectiveSessionRoles(), minimumRole);
}

function sessionHasAnyRole(roles) {
  const effectiveRoles = getEffectiveSessionRoles();
  return roles.some((role) => effectiveRoles.includes(role));
}

function canAccessFinance() {
  return !!SESSION?.canViewFinance || sessionHasRoleAtLeast('Admin');
}

function canAccessManagement() {
  return sessionHasAnyRole(['Super Admin', 'Admin', 'Client Admin']);
}

function canImpersonateUsers() {
  return String(SESSION?.userId || '') === 'USR001' || String(SESSION?.email || '').toLowerCase() === 'mugilvannan@myipstrategy.com';
}

function isInternalUser() {
  return sessionHasAnyRole(['Super Admin', 'Admin', 'Galvanizer', 'Staff', 'Attorney']);
}

function canAccessStreamMessaging() {
  return !!window.APP_CONFIG?.streamEnabled && isInternalUser();
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  applyTheme(getStoredTheme());
  SESSION = await Auth.requireAuth();
  if (!SESSION) {
    window.location.href = 'index.html';
    return;
  }
  if (!isInternalUser()) {
    window.location.href = 'client-portal.html';
    return;
  }

  if (!canAccessManagement()) {
    document.getElementById('nav-mgmt-section').style.display = 'none';
  }
  if (!canAccessFinance()) {
    document.getElementById('nav-finance').style.display = 'none';
  }
  if (!isInternalUser()) {
    ['stream','messages','notifications','dailyaudit','expenses','galvanizer','contact'].forEach((page) => {
      document.querySelector(`[data-page="${page}"]`)?.style.setProperty('display', 'none');
    });
    document.getElementById('circle-nav-section').style.display = 'none';
  }
  if (!canAccessStreamMessaging()) {
    document.getElementById('nav-stream')?.style.setProperty('display', 'none');
  }

  // Populate sidebar user info
  const initials = (SESSION.name || 'U').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sidebar-avatar').textContent = initials;
  document.getElementById('sidebar-name').textContent = SESSION.name || SESSION.email;
  document.getElementById('sidebar-role').textContent = SESSION.role;
  applySidebarState();
  applyNavSectionState();
  await populateCircleNav();
  startSafePrefetch();

  const initialPage = getValidPageFromHash();
  syncHashToPage(initialPage, true);
  showPage(initialPage);
})();

window.addEventListener('hashchange', () => {
  if (__suppressHashRouting) return;
  const targetPage = getValidPageFromHash();
  if (targetPage === CURRENT_PAGE) return;
  showPage(targetPage);
});

function toggleSidebarCollapsed() {
  const next = !document.body.classList.contains('sidebar-hidden');
  document.body.classList.toggle('sidebar-hidden', next);
  try { localStorage.setItem(SIDEBAR_COLLAPSED_STORAGE_KEY, next ? '1' : '0'); } catch {}
}

function applySidebarState() {
  try {
    const hidden = localStorage.getItem(SIDEBAR_COLLAPSED_STORAGE_KEY) === '1';
    document.body.classList.toggle('sidebar-hidden', hidden);
  } catch {}
}

function readNavSectionState() {
  try {
    return JSON.parse(localStorage.getItem(NAV_SECTION_STORAGE_KEY) || '{}');
  } catch {
    return {};
  }
}

function writeNavSectionState(state) {
  try { localStorage.setItem(NAV_SECTION_STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function toggleNavSection(sectionName) {
  const state = readNavSectionState();
  const current = state[sectionName] !== false;
  state[sectionName] = !current;
  writeNavSectionState(state);
  applyNavSectionState();
}

function applyNavSectionState() {
  const state = readNavSectionState();
  document.querySelectorAll('[data-nav-section]').forEach((section) => {
    const name = section.getAttribute('data-nav-section');
    const expanded = state[name] !== false;
    section.classList.toggle('collapsed', !expanded);
  });
}

async function populateCircleNav() {
  const wrap = document.getElementById('circle-nav-items');
  try {
    const circles = await API.getCircles();
    if (!Array.isArray(circles) || !circles.length) {
      document.getElementById('circle-nav-section').style.display = 'none';
      return;
    }
    wrap.innerHTML = circles.map(circle => `
      <button class="nav-item" data-page="circles" onclick='loadCircles(${JSON.stringify(JSON.stringify(circle))})'>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><path d="M8 5v6M5 8h6"/></svg>
        ${circle.CIRCLE_NAME}
      </button>`).join('');
  } catch (e) {
    document.getElementById('circle-nav-section').style.display = 'none';
  }
}

// ── Navigation ───────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard: 'Dashboard',
  cases: 'Cases',
  documents: 'Documents',
  stream: 'Stream Messaging',
  workflow: 'Workflow Board',
  attorney: 'Attorney Workspace',
  docworkflow: 'Document Request',
  finance: 'Finance',
  messages: 'Threads',
  notifications: 'Notification Center',
  tasks: 'Task System',
  approvals: 'Approval Workflow',
  dailyaudit: 'Daily Audit',
  expenses: 'Expense Claims',
  galvanizer: 'Galvanizer Queue',
  circles: 'Circles',
  management: 'Management',
  contact: 'Contact',
};

let __suppressHashRouting = false;

function getValidPageFromHash() {
  const raw = String(window.location.hash || '').replace(/^#/, '').trim().toLowerCase();
  if (!raw) return 'dashboard';
  return Object.prototype.hasOwnProperty.call(PAGE_TITLES, raw) ? raw : 'dashboard';
}

function syncHashToPage(page, replace) {
  const targetHash = `#${page}`;
  if (window.location.hash === targetHash) return;
  __suppressHashRouting = true;
  if (replace) {
    window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}${targetHash}`);
  } else {
    window.location.hash = targetHash;
  }
  setTimeout(() => { __suppressHashRouting = false; }, 0);
}

function showPage(page) {
  if (!Object.prototype.hasOwnProperty.call(PAGE_TITLES, page)) {
    page = 'dashboard';
  }
  CURRENT_PAGE = page;
  syncHashToPage(page, false);
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  document.querySelector('.sidebar').classList.remove('open');

  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>Loading…</span></div>';

  setTopbarActions('');

  const loaders = {
    dashboard: loadDashboard,

async function startImpersonation(userId) {
  if (!canImpersonateUsers() || !userId) return;
  if (!confirm('Impersonate this user for testing?')) return;
  try {
    const currentSession = Auth.getGasSession();
    if (currentSession && !currentSession.impersonatedByUserId) {
      sessionStorage.setItem('mg_original_session', JSON.stringify(currentSession));
    }
    const result = await API.impersonateUser(userId);
    const nextSession = Object.assign({}, result.session || {}, { token: result.token });
    Auth.setGasSession(nextSession);
    const effectiveRoles = (window.Auth && typeof window.Auth.getEffectiveSessionRoles === 'function')
      ? window.Auth.getEffectiveSessionRoles(nextSession)
      : [nextSession.role].filter(Boolean);
    const isInternal = effectiveRoles.some((role) => ['Super Admin', 'Admin', 'Galvanizer', 'Staff', 'Attorney'].includes(role));
    window.location.href = isInternal ? 'dashboard.html' : 'client-portal.html';
  } catch (e) {
    alert(e.message || 'Unable to impersonate user.');
  }
}

function stopImpersonation() {
  try {
    const raw = sessionStorage.getItem('mg_original_session');
    if (!raw) {
      alert('Original session not found.');
      return;
    }
    const originalSession = JSON.parse(raw);
    Auth.setGasSession(originalSession);
    sessionStorage.removeItem('mg_original_session');
    location.reload();
  } catch (e) {
    alert('Unable to restore original session.');
  }
}

  if (!v) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(String(v))) return String(v);
  const parsed = new Date(v);
  if (!isNaN(parsed.getTime())) return parsed.toISOString().split('T')[0];
  const match = String(v).match(/^(\d{2})-([A-Za-z]{3})-(\d{4})$/);

  const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  return `${match[3]}-${months[match[2]] || '01'}-${match[1]}`;
}

function getPagerState(key, defaultSize = 10) {
  if (!TABLE_PAGERS[key]) {
    TABLE_PAGERS[key] = { page: 1, size: defaultSize };

}

function paginateItems(items, key, defaultSize = 10) {
  const list = Array.isArray(items) ? items : [];
  const state = getPagerState(key, defaultSize);
  const total = list.length;
  const totalPages = Math.max(1, Math.ceil(total / state.size));
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * state.size;
  const end = start + state.size;
  return {
    items: list.slice(start, end),
    total,
    start: total ? start + 1 : 0,
    end: Math.min(end, total),
    page: state.page,
    size: state.size,
    totalPages
  };
}

function normalizeAlphaValue(value) {
  return String(value == null ? '' : value).trim().toLowerCase();
}

function normalizeSearchText(value) {
  return String(value == null ? '' : value)
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function fuzzyIncludesText(haystack, needle) {
  const source = normalizeSearchText(haystack);
  const target = normalizeSearchText(needle);
  if (!target) return true;
  if (!source) return false;
  if (source.includes(target)) return true;
  let position = 0;
  for (let i = 0; i < target.length; i++) {
    const ch = target[i];
    if (ch === ' ') continue;
    position = source.indexOf(ch, position);
    if (position === -1) return false;
    position += 1;
  }
  return true;
}

function matchesBroadSearch(values, query) {
  const terms = normalizeSearchText(query).split(' ').filter(Boolean);
  if (!terms.length) return true;
  const fields = (values || []).map((value) => normalizeSearchText(value)).filter(Boolean);
  const allText = fields.join(' ');
  return terms.every((term) => {
    if (allText.includes(term)) return true;
    return fields.some((field) => fuzzyIncludesText(field, term));
  });
}

function sortItemsBy(items, getter, direction = 'az') {
  const factor = direction === 'za' ? -1 : 1;
  return [...(items || [])].sort((a, b) => {
    const left = normalizeAlphaValue(getter(a));
    const right = normalizeAlphaValue(getter(b));
    return left.localeCompare(right, undefined, { numeric: true, sensitivity: 'base' }) * factor;
  });
}

function normalizeExcelImportDate(value) {
  if (!value) return '';
  if (value instanceof Date && !Number.isNaN(value.getTime())) return value.toISOString().split('T')[0];
  if (typeof value === 'number' && window.XLSX?.SSF?.parse_date_code) {

    if (parsed && parsed.y && parsed.m && parsed.d) {

      if (!Number.isNaN(date.getTime())) return date.toISOString().split('T')[0];
    }
  }
  const parsedDate = new Date(value);
  return Number.isNaN(parsedDate.getTime()) ? '' : parsedDate.toISOString().split('T')[0];
}

async function parseDocketTrakWorkbook(file) {
  const sourceRows = await readDocketTrakRows_(file);
  if (!sourceRows.length) throw new Error('The uploaded sheet is empty.');

  const parsedRows = sourceRows.map((row, index) => {
    const recordType = normalizeImportRecordType(row['Record Type']);
    const title = String(row['Description/Title'] || '').trim();
    const issues = [];
    if (!recordType) issues.push('Unsupported record type');
    if (!title) issues.push('Missing title');
    return {
      sourceRowNumber: index + 2,
      recordType,
      title,
      country: String(row['Country'] || '').trim() || 'India',
      applicationNumber: String(row['Reference Number'] || '').trim(),
      referenceNumber: String(row['Reference Number'] || '').trim(),
      docketingEvent: String(row['Docketing Event'] || '').trim(),
      sourceStatus: String(row['Status'] || '').trim(),
      sourceClient: String(row['Client'] || '').trim(),
      eventDate: normalizeExcelImportDate(row['Docketing Event Date']),
      notes: '',
      issues,
      importable: issues.length === 0
    };
  });

  const importableRows = parsedRows.filter(row => row.importable);
  const skippedRows = parsedRows.filter(row => !row.importable);
  return {
    fileName: file.name,
    parsedRows,
    importableRows,
    skippedRows,
    headers: Object.keys(sourceRows[0] || {}),
    patentCount: importableRows.filter(row => row.recordType === 'Patent').length,
    trademarkCount: importableRows.filter(row => row.recordType === 'Trademark').length
  };
}

async function readDocketTrakRows_(file) {
  const arrayBuffer = await file.arrayBuffer();
  const primaryError = [];
  if (window.XLSX) {
    try {
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true, WTF: false });
      const sheet = workbook.Sheets['IP Records'] || workbook.Sheets[workbook.SheetNames[0]];
      if (sheet) {
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: true });
        if (rows.length) return rows;
      }
    } catch (e) {
      primaryError.push(e?.message || String(e));
    }
  }
  if (window.JSZip) {
    try {
      return await readDocketTrakRowsFromZip_(arrayBuffer);
    } catch (e) {
      primaryError.push(e?.message || String(e));
    }
  }
  throw new Error(primaryError[0] || 'Could not read the uploaded Excel file.');
}

function columnLettersToIndex_(letters) {
  let index = 0;
  const text = String(letters || '').toUpperCase();
  for (let i = 0; i < text.length; i += 1) {
    index = (index * 26) + (text.charCodeAt(i) - 64);
  }
  return Math.max(0, index - 1);
}

function excelSerialToIsoDate_(serial) {
  const numeric = Number(serial);
  if (!Number.isFinite(numeric)) return String(serial || '');
  const utcDays = Math.floor(numeric - 25569);
  const utcValue = utcDays * 86400;
  const dateInfo = new Date(utcValue * 1000);
  return Number.isNaN(dateInfo.getTime()) ? String(serial || '') : dateInfo.toISOString().split('T')[0];
}

function getXmlTextContent_(node) {
  if (!node) return '';
  return Array.from(node.getElementsByTagName('*'))
    .filter(child => child.tagName && child.tagName.split(':').pop() === 't')
    .map(child => child.textContent || '')
    .join('');
}

async function readDocketTrakRowsFromZip_(arrayBuffer) {
  const zip = await JSZip.loadAsync(arrayBuffer);
  const parser = new DOMParser();

  async function readXml(path) {
    const file = zip.file(path);
    if (!file) return null;
    const xml = await file.async('string');
    return parser.parseFromString(xml, 'application/xml');
  }

  const workbookXml = await readXml('xl/workbook.xml');
  if (!workbookXml) throw new Error('Missing workbook.xml');
  const relsXml = await readXml('xl/_rels/workbook.xml.rels');
  if (!relsXml) throw new Error('Missing workbook relationships');

  const workbookSheets = Array.from(workbookXml.getElementsByTagName('*')).filter(node => node.tagName && node.tagName.split(':').pop() === 'sheet');
  const targetSheet = workbookSheets.find(node => String(node.getAttribute('name') || '').trim() === 'IP Records') || workbookSheets[0];
  if (!targetSheet) throw new Error('No worksheet definition found');

  const relId = targetSheet.getAttribute('r:id') || targetSheet.getAttribute('id');
  const relNodes = Array.from(relsXml.getElementsByTagName('*')).filter(node => node.tagName && node.tagName.split(':').pop() === 'Relationship');
  const relationship = relNodes.find(node => String(node.getAttribute('Id') || '') === String(relId || ''));
  if (!relationship) throw new Error('Worksheet relationship not found');

  let targetPath = relationship.getAttribute('Target') || '';
  if (!targetPath) throw new Error('Worksheet target not found');
  if (!/^xl\//i.test(targetPath)) targetPath = `xl/${targetPath.replace(/^\//, '')}`;
  const sheetXml = await readXml(targetPath);
  if (!sheetXml) throw new Error('Worksheet XML could not be read');

  const sharedStringsXml = await readXml('xl/sharedStrings.xml');
  const sharedStrings = sharedStringsXml
    ? Array.from(sharedStringsXml.getElementsByTagName('*'))
        .filter(node => node.tagName && node.tagName.split(':').pop() === 'si')
        .map(getXmlTextContent_)
    : [];

  const rows = Array.from(sheetXml.getElementsByTagName('*')).filter(node => node.tagName && node.tagName.split(':').pop() === 'row');
  if (!rows.length) return [];

  const matrix = rows.map(rowNode => {
    const cells = [];
    Array.from(rowNode.getElementsByTagName('*'))
      .filter(node => node.tagName && node.tagName.split(':').pop() === 'c')
      .forEach(cellNode => {
        const ref = cellNode.getAttribute('r') || '';
        const colLetters = (ref.match(/[A-Z]+/i) || [''])[0];
        const colIndex = columnLettersToIndex_(colLetters);
        const type = cellNode.getAttribute('t') || '';
        const valueNode = Array.from(cellNode.childNodes).find(node => node.nodeType === 1 && node.tagName && node.tagName.split(':').pop() === 'v');
        const inlineNode = Array.from(cellNode.childNodes).find(node => node.nodeType === 1 && node.tagName && node.tagName.split(':').pop() === 'is');
        let value = '';
        if (type === 's' && valueNode) value = sharedStrings[Number(valueNode.textContent || 0)] || '';
        else if (type === 'inlineStr' && inlineNode) value = getXmlTextContent_(inlineNode);
        else if (valueNode) value = valueNode.textContent || '';
        cells[colIndex] = value;
      });
    return cells;
  });

  const headers = (matrix[0] || []).map(value => String(value || '').trim());
  return matrix.slice(1).map(row => {
    const obj = {};
    headers.forEach((header, index) => {
      if (!header) return;
      let value = row[index] != null ? row[index] : '';
      if (/Date/i.test(header)) value = excelSerialToIsoDate_(value);
      obj[header] = value;
    });
    return obj;
  }).filter(row => Object.keys(row).length > 0);
}

  const paged = paginateItems(CASES_ALL, 'cases', 10);
  const cases = paged.items;
  if (!cases.length) {
    document.getElementById('page-content').innerHTML = `
    <div class="page">

  }
  const rows = cases.map(c => `
    <tr>
      ${canBulk ? `<td><input type="checkbox" class="case-bulk-check" value="${c.CASE_ID}" /></td>` : ''}

      <td><div style="font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.PATENT_TITLE}</div>

      <td style="color:${c.NEXT_DEADLINE?'var(--amber)':'var(--text-3)'}">${fmt(c.NEXT_DEADLINE)}</td>
      <td style="font-size:12px;color:var(--text-2)">${c.ATTORNEY||'—'}</td>
      ${canEdit ? `<td><div class="action-row">
        <button class="btn btn-ghost btn-sm" onclick='openCaseModal(${JSON.stringify(JSON.stringify(c))})'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem('Case','${c.CASE_ID}')">Del</button>
      </div></td>` : ''}
    </tr>`).join('');

  document.getElementById('page-content').innerHTML = `
  <div class="page">
    ${renderCaseFilters('cases')}

      <thead><tr>${canBulk?'<th></th>':''}<th>Case ID</th><th>Patent Title</th><th>Country</th><th>Filed</th><th>Status</th><th>Workflow Stage</th><th>Deadline</th><th>Attorney</th>${canEdit?'<th>Actions</th>':''}</tr></thead>

}

async function loadMoreCases() {
  const btn = document.getElementById('cases-load-more');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Loading...';
  }
  try {
    const page = await API.getCasesPage(CASE_FILTERS, CASES_PAGE_LIMIT, CASES_PAGE_OFFSET);
    const nextItems = Array.isArray(page.items) ? page.items : [];
    CASES_ITEMS = CASES_ITEMS.concat(nextItems);
    CASES_TOTAL = page.total || CASES_ITEMS.length;
    CASES_HAS_MORE = !!page.hasMore;
    CASES_PAGE_OFFSET = page.nextOffset || CASES_ITEMS.length;
    renderCases(CASES_ITEMS, sessionHasRoleAtLeast('Staff'), sessionHasRoleAtLeast('Admin'));
  } catch (e) {
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Load More';

    alert('Error loading more cases: ' + e.message);
  }
}

function renderCaseFilters(mode = 'cases') {

  const statuses = ['','Drafted','Filed','Published','Under Examination','Granted','Abandoned','Lapsed','Refused'];
  const countries = ['','India','USA','EPO','PCT','China','Japan','Other'];

  const caseIdField = mode === 'galvanizer'
    ? `<div class="form-group search-dropdown">

           <input class="form-control" id="galvanizer-filter-caseid" value="${state.caseId || ''}" placeholder="Search case ID" autocomplete="off" onfocus="renderGalvanizerCaseIdDropdown(true)" oninput="renderGalvanizerCaseIdDropdown(true)" />
           <div class="search-dropdown-menu" id="galvanizer-caseid-menu"></div>

       </div>`
    : `<div class="form-group"><label class="form-label">Case ID</label><input class="form-control" id="case-filter-caseid" value="${state.caseId || ''}" placeholder="A61M002" /></div>`;
  return `
  <div class="card filter-panel filter-drawer ${FILTER_PANEL_STATE[filterKey] ? 'open' : ''}">

      <div class="card-title">${mode === 'galvanizer' ? 'Galvanizer Filters' : 'Case Filters'}</div>
      <div class="filter-actions">
        <button class="btn btn-primary btn-sm" onclick="applyCaseFilters('${mode}')">Apply</button>
        <button class="btn btn-ghost btn-sm" onclick="resetCaseFilters('${mode}')">Reset</button>
      </div>
    </div>
    <div class="filter-grid">
      <div class="form-group">
        <label class="form-label">Client Code</label>
        <input class="form-control" id="${mode === 'galvanizer' ? 'galvanizer-filter-client' : 'case-filter-client'}" list="case-filter-clients" value="${state.clientCode || ''}" placeholder="A61M" />
        <datalist id="case-filter-clients">${buildClientOptions(CLIENT_LOOKUP_CACHE)}</datalist>
      </div>
      ${caseIdField}
      <div class="form-group"><label class="form-label">Search</label><input class="form-control" id="${mode === 'galvanizer' ? 'galvanizer-filter-query' : 'case-filter-query'}" value="${state.query || ''}" placeholder="Title, app no, attorney" /></div>
      ${mode === 'cases' ? `<div class="form-group"><label class="form-label">Status</label><select class="form-control" id="case-filter-status">${statuses.map(v=>`<option value="${v}"${state.status===v?' selected':''}>${v||'All'}</option>`).join('')}</select></div>` : ''}
      ${mode === 'cases' ? `<div class="form-group"><label class="form-label">Country</label><select class="form-control" id="case-filter-country">${countries.map(v=>`<option value="${v}"${state.country===v?' selected':''}>${v||'All'}</option>`).join('')}</select></div>` : ''}
      <div class="form-group"><label class="form-label">Workflow Stage</label><select class="form-control" id="${mode === 'galvanizer' ? 'galvanizer-filter-stage' : 'case-filter-stage'}">${stages.map(v=>`<option value="${v}"${state.workflowStage===v?' selected':''}>${v||'All'}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Sort</label><select class="form-control" id="${mode === 'galvanizer' ? 'galvanizer-filter-sort' : 'case-filter-sort'}"><option value="az"${state.sortDir==='az'?' selected':''}>A-Z</option><option value="za"${state.sortDir==='za'?' selected':''}>Z-A</option></select></div>

function applyCaseFilters(mode = 'cases') {
  if (mode === 'galvanizer') {
    GALVANIZER_FILTERS = {
      clientCode: document.getElementById('galvanizer-filter-client')?.value.trim().toUpperCase() || '',
      caseId: document.getElementById('galvanizer-filter-caseid')?.value.trim().toUpperCase() || '',
      query: document.getElementById('galvanizer-filter-query')?.value.trim() || '',
      workflowStage: document.getElementById('galvanizer-filter-stage')?.value || '',
      sortDir: document.getElementById('galvanizer-filter-sort')?.value || 'az',
    };
    FILTER_PANEL_STATE.galvanizer = false;
  } else {
    CASE_FILTERS = {
      clientCode: document.getElementById('case-filter-client')?.value.trim().toUpperCase() || '',
      caseId: document.getElementById('case-filter-caseid')?.value.trim().toUpperCase() || '',
      query: document.getElementById('case-filter-query')?.value.trim() || '',
      status: document.getElementById('case-filter-status')?.value || '',
      country: document.getElementById('case-filter-country')?.value || '',
      workflowStage: document.getElementById('case-filter-stage')?.value || '',
      sortDir: document.getElementById('case-filter-sort')?.value || 'az',
    };
    FILTER_PANEL_STATE.cases = false;
  }
  reloadCaseFilterTarget();
}

function resetCaseFilters(mode = 'cases') {
  if (mode === 'galvanizer') {
    GALVANIZER_FILTERS = { clientCode: '', caseId: '', workflowStage: '', query: '', sortDir: 'az' };
    FILTER_PANEL_STATE.galvanizer = false;
  } else {
    CASE_FILTERS = { clientCode: '', caseId: '', status: '', country: '', workflowStage: '', query: '', sortDir: 'az' };
    FILTER_PANEL_STATE.cases = false;
  }
  reloadCaseFilterTarget();
}

function reloadCaseFilterTarget() {
  if (CASE_FILTER_TARGET === 'galvanizer') return loadGalvanizerQueue();
  return loadCases();
}

  const sections = Object.keys(docs).map(cat => {

    return `<div class="doc-section card" style="margin-bottom:16px">
      <div class="doc-section-title">${ICONS[cat]||'📁'} ${cat.replace(/_/g,' ')}</div>

function getInvoiceUiId(inv) {
  return String(inv?.['Docket# [Invoice UIN]'] || inv?.['Tax Invoice Number'] || '');
}

function getInvoiceUiTotal(inv) {
  return parseFloat(inv?.InvAmount || 0) || 0;
}

function getInvoiceUiDue(inv) {
  if (inv?.['Amount due'] != null && String(inv['Amount due']) !== '') return parseFloat(inv['Amount due']) || 0;
  if (inv?.PAYMENT_STATUS === 'Partially Paid') {
    return Math.max(getInvoiceUiTotal(inv) - (parseFloat(inv?.PAYMENT_AMOUNT || 0) || 0), 0);
  }
  return inv?.PAYMENT_STATUS === 'Paid' ? 0 : getInvoiceUiTotal(inv);
}

function invoiceFieldValue(inv, key) {
  return inv && inv[key] != null ? String(inv[key]) : '';
}

function encodeInlinePayload(value) {
  return encodeURIComponent(JSON.stringify(value || {}));
}

function decodeInlinePayload(encoded) {
  try {
    return JSON.parse(decodeURIComponent(encoded || ''));
  } catch (e) {
    return null;
  }
}

function openInvoiceModalFromEncoded(encoded) {
  const inv = decodeInlinePayload(encoded);
  return openInvoiceModal(inv ? JSON.stringify(inv) : '');
}

function openInvoicePaymentModalFromEncoded(encoded) {
  const inv = decodeInlinePayload(encoded);
  return openInvoicePaymentModal(inv ? JSON.stringify(inv) : '');
}

function previewInvoiceByLink(link) {

function getFinanceSearchFields(inv) {
  return [

    inv?.['Docket Number'],

    inv?.['Service Code 2'],
    inv?.['Service Code 3'],
    inv?.['First Inventor'],
    inv?.['Title Identfication (Only key words, Enter in lower case}'],
    inv?.['Patent Office'],
    inv?.PAYMENT_STATUS,
    inv?.TAX_TYPE,
    inv?.NOTES
  ];
}

function getFilteredFinanceInvoices() {
  const clientCode = String(FINANCE_FILTERS.clientCode || '').trim().toUpperCase();
  const query = String(FINANCE_FILTERS.query || '').trim();
  const sorted = sortItemsBy((FINANCE_INVOICES_CACHE || []).filter((inv) => {
    const invoiceClientCode = String(inv?.ClientCode || inv?.CLIENT_ID || '').trim().toUpperCase();
    if (clientCode && !invoiceClientCode.includes(clientCode)) return false;
    if (query && !matchesBroadSearch(getFinanceSearchFields(inv), query)) return false;
    return true;
  }), (inv) => inv?.['Name of Client'] || inv?.ClientCode || getInvoiceUiId(inv), FINANCE_FILTERS.sortDir);
  return sorted;
}

function renderFinance(invoices = FINANCE_INVOICES_CACHE, canEdit = sessionHasRoleAtLeast('Admin')) {
  if (Array.isArray(invoices)) FINANCE_INVOICES_CACHE = invoices;
  const filteredInvoices = getFilteredFinanceInvoices();
  const paged = paginateItems(filteredInvoices, 'finance-invoices', 10);
  let paid=0, unpaid=0, paidSum=0, unpaidSum=0;
  filteredInvoices.forEach(inv => {
    const total = getInvoiceUiTotal(inv);
    const due = getInvoiceUiDue(inv);
    if (inv.PAYMENT_STATUS === 'Paid') { paid++; paidSum += total; }
    else { unpaid++; unpaidSum += due; }
  });

  const rows = paged.items.map(inv => {
    const isPaid = inv.PAYMENT_STATUS === 'Paid';
    const encoded = encodeInlinePayload(inv);
    return `<tr>
      <td class="text-em" style="font-family:'Syne',sans-serif;font-size:12px">${escapeHtml(getInvoiceUiId(inv))}</td>
      <td>${fmt(inv['Invoice Date'])}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(inv.ClientCode || inv.CLIENT_ID || '')}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(inv['Name of Client'] || inv.CLIENT_NAME || '')}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(inv['Docket Number'] || '')}</td>

      <td>${money(getInvoiceUiTotal(inv))}</td>
      <td style="font-weight:600">${money(getInvoiceUiDue(inv))}</td>
      <td>${statusBadge(inv.PAYMENT_STATUS)}</td>
      ${canEdit ? `<td><div class="action-row">
        ${!isPaid ? financeActionIconButton('Mark Paid', 'payments', 'btn-success', `markPaid('${escapeAttr(getInvoiceUiId(inv))}', this)`) : ''}
        ${financeActionIconButton('Preview', 'visibility', 'btn-ghost', `previewInvoiceByLink('${escapeAttr(inv.INVOICE_PDF_LINK || '')}')`)}
        ${financeActionIconButton('Send Invoice', 'rocket_launch', 'btn-ghost', `sendInvoiceNow('${escapeAttr(getInvoiceUiId(inv))}', this)`)}
        ${financeActionIconButton('Payment', 'currency_rupee', 'btn-ghost', `openInvoicePaymentModalFromEncoded('${encoded}')`)}
        ${financeActionIconButton('Edit Invoice', 'edit', 'btn-ghost', `openInvoiceModalFromEncoded('${encoded}')`)}
        <button class="btn btn-danger btn-sm" onclick="deleteItem('Invoice','${escapeAttr(getInvoiceUiId(inv))}')">Del</button>
      </div></td>` : ''}
    </tr>`;
  }).join('');

  document.getElementById('page-content').innerHTML = `
  <div class="page">
    ${renderFinanceFilters()}
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr))">
      <div class="stat-card"><div class="stat-label">Total Invoices</div><div class="stat-value">${filteredInvoices.length}</div></div>
      <div class="stat-card accent-rose"><div class="stat-label">Pending Count</div><div class="stat-value">${unpaid}</div></div>
      <div class="stat-card accent-emerald"><div class="stat-label">Paid Count</div><div class="stat-value">${paid}</div></div>
      <div class="stat-card accent-amber"><div class="stat-label">Pending Amount</div><div class="stat-value" style="font-size:18px">${money(unpaidSum)}</div></div>
      <div class="stat-card accent-emerald"><div class="stat-label">Paid Amount</div><div class="stat-value" style="font-size:18px">${money(paidSum)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Invoice Ledger</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Invoice UIN</th><th>Date</th><th>Client Code</th><th>Client</th><th>Docket</th><th>Service Code</th><th>Invoice Amount</th><th>Amount Due</th><th>Status</th>${canEdit?'<th>Actions</th>':''}</tr></thead>

async function submitQuickInvoicePayment(invoiceId, total) {
  const btn = document.getElementById('qp-save-btn');
  const paidAmount = parseFloat(document.getElementById('qp-paid-amount')?.value || 0) || 0;
  if (paidAmount < 0) {
    alert('Paid amount cannot be negative.');
    return;
  }
  if (paidAmount > total) {
    alert('Paid amount cannot exceed invoice amount.');
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    await API.updateInvoicePayment(invoiceId, {
      PAYMENT_AMOUNT: paidAmount,
      PAYMENT_DATE: document.getElementById('qp-payment-date')?.value || '',
      PAYMENT_MODE: document.getElementById('qp-payment-mode')?.value.trim() || '',
    });
    closeModal('modal-generic');
    loadFinance();
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Save Payment';
  }
}

async function sendInvoiceNow(invoiceId, btn) {
  if (!confirm(`Send invoice ${invoiceId} to the client now?`)) return;
  const oldText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    let result;
    try {
      result = await API.sendInvoice(invoiceId);
    } catch (e) {
      if (String(e.message || '').toLowerCase().includes('client email not found')) {
        const manualEmail = prompt('Client email not found. Enter email to send this invoice manually:');
        if (!manualEmail) throw new Error('Invoice send cancelled.');
        result = await API.sendInvoice(invoiceId, manualEmail.trim());
      } else {
        throw e;
      }
    }
    alert(result.message || 'Invoice sent.');
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
}

async function deleteItem(type, id) {
  if (!confirm(`Delete ${type} ${id}? This cannot be undone.`)) return;
  try {
    const fn = {User: API.deleteUser, Client: API.deleteClient, Case: API.deleteCase, Invoice: API.deleteInvoice}[type];
    const result = await fn(id);
    if (result.success) {
      // Refresh current view
      if (type === 'Invoice') loadFinance();
      else if (type === 'Case') { if (_mgmtTab === 'cases') loadMgmtCases(); else loadCases(); }
      else if (_mgmtTab) switchMgmtTab(_mgmtTab);
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function truncateText(value, max = 64) {
  const text = String(value || '').trim();
  return text.length > max ? `${text.slice(0, max - 1)}…` : text;
}

function escapeAttr(value) {
  return String(value || '').replace(/"/g, '&quot;');
}

function formatChatTime(value) {
  if (!value) return '';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '';
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  return sameDay
    ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : d.toLocaleDateString([], { day: '2-digit', month: 'short' });
}

async function loadStreamSdk() {
  if (window.__STREAM_CHAT_CTOR__) return window.__STREAM_CHAT_CTOR__;
  if (window.streamChat?.StreamChat) {
    window.__STREAM_CHAT_CTOR__ = window.streamChat.StreamChat;
    return window.__STREAM_CHAT_CTOR__;
  }
  if (window.StreamChat) {
    window.__STREAM_CHAT_CTOR__ = window.StreamChat;
    return window.__STREAM_CHAT_CTOR__;
  }
  const mod = await import('https://esm.sh/stream-chat@9?bundle');
  window.__STREAM_CHAT_CTOR__ = mod.StreamChat || mod.default?.StreamChat || mod.default || null;
  return window.__STREAM_CHAT_CTOR__;
}

async function disconnectStreamMessaging() {
  if (STREAM_STATE.unsubscribe && typeof STREAM_STATE.unsubscribe.unsubscribe === 'function') {
    try { STREAM_STATE.unsubscribe.unsubscribe(); } catch {}
  }
  STREAM_STATE.unsubscribe = null;
  if (STREAM_STATE.client && typeof STREAM_STATE.client.disconnectUser === 'function') {
    try { await STREAM_STATE.client.disconnectUser(); } catch {}
  }
  STREAM_STATE.client = null;
  STREAM_STATE.auth = null;
  STREAM_STATE.channels = [];
  STREAM_STATE.activeChannel = null;
  STREAM_STATE.pendingFile = null;
  STREAM_STATE.pendingPoll = null;
  STREAM_STATE.typingTimeout = null;
  STREAM_STATE.draftText = '';
  STREAM_STATE.contextMenu = { messageId: '', mode: '' };
}

function canModerateStreamMessages() {
  return sessionHasAnyRole(['Super Admin', 'Admin']);
}

function getStreamChannelMeta(channel) {
  const state = channel?.state || {};
  const messages = state.messages || [];
  const lastMessage = messages[messages.length - 1] || null;
  const currentUserId = STREAM_STATE.auth?.user?.id;
  const otherMembers = Object.values(state.members || {}).filter((member) => member.user?.id !== currentUserId);
  const memberNames = otherMembers.map((member) => member.user?.name || member.user?.email || member.user?.id).filter(Boolean);
  const title = channel?.data?.name || memberNames.join(', ') || 'Untitled chat';
  const typingUsers = Object.values(state.typing || {}).filter((entry) => entry?.user?.id && entry.user.id !== currentUserId);
  return {
    state,
    messages,
    lastMessage,
    otherMembers,
    memberNames,
    title,
    isGroup: Number(channel?.data?.member_count || Object.keys(state.members || {}).length || 0) > 2,
    typingUsers,
  };
}

function buildStreamUserLookup() {
  const map = new Map();
  getInternalStreamCandidates().forEach((user) => {
    const streamId = buildStreamUserIdForDirectory(user);
    map.set(streamId, user);
    map.set(String(user.EMAIL || '').toLowerCase(), user);
  });
  return map;
}

function getStreamMentionTargets(channel) {
  const lookup = buildStreamUserLookup();
  const currentUserId = STREAM_STATE.auth?.user?.id;
  return Object.values(channel?.state?.members || {})
    .map((member) => member.user)
    .filter((user) => user?.id && user.id !== currentUserId)
    .map((user) => {
      const directory = lookup.get(user.id) || lookup.get(String(user.email || '').toLowerCase()) || {};
      return {
        id: user.id,
        name: user.name || directory.FULL_NAME || user.email || user.id,
        email: user.email || directory.EMAIL || '',
      };
    });
}

function parseStreamMentionedUsers(text, channel) {
  const targets = getStreamMentionTargets(channel);
  const lowerText = String(text || '').toLowerCase();
  return targets
    .filter((target) => lowerText.includes(`@${String(target.email || '').toLowerCase()}`))
    .map((target) => ({ id: target.id, name: target.name }));
}

function getStreamReadSummary(channel, message) {
  if (!message?.created_at) return '';
  const createdAt = new Date(message.created_at).getTime();
  if (!createdAt) return '';
  const readers = Object.values(channel?.state?.read || {})
    .filter((entry) => entry?.user?.id && entry.user.id !== STREAM_STATE.auth?.user?.id)
    .filter((entry) => new Date(entry.last_read || 0).getTime() >= createdAt)
    .map((entry) => entry.user?.name || entry.user?.email || entry.user?.id)
    .filter(Boolean);
  if (!readers.length) return '';
  return `Read by ${readers.join(', ')}`;
}

function getStreamPollAttachment(message) {
  return (message?.attachments || []).find((attachment) => attachment?.type === 'portal_poll') || null;
}

function getStreamPollVotes(message, attachment) {
  const votes = {};
  (attachment?.options || []).forEach((option) => {
    votes[option.id] = 0;
  });
  (message?.latest_reactions || []).forEach((reaction) => {
    const match = String(reaction.type || '').match(/^poll_(.+)$/);
    if (match && Object.prototype.hasOwnProperty.call(votes, match[1])) {
      votes[match[1]] += 1;
    }
  });
  return votes;
}

function hasOwnStreamReaction(message, reactionType) {
  const own = message?.own_reactions || [];
  return own.some((reaction) => String(reaction.type || '') === String(reactionType || ''));
}

function renderStreamPoll(message) {
  const attachment = getStreamPollAttachment(message);
  if (!attachment) return '';
  const votes = getStreamPollVotes(message, attachment);
  const totalVotes = Object.values(votes).reduce((sum, count) => sum + count, 0);
  const options = (attachment.options || []).map((option) => {
    const count = votes[option.id] || 0;
    const active = hasOwnStreamReaction(message, `poll_${option.id}`);
    return `
      <button class="stream-poll-option ${active ? 'active' : ''}" onclick="voteStreamPoll('${escapeAttr(message.id)}','${escapeAttr(option.id)}')">
        <span>${option.label}</span>
        <span>${count}</span>
      </button>`;
  }).join('');
  return `
    <div class="stream-poll">
      <div class="stream-poll-question">${attachment.question || 'Poll'}</div>
      <div class="stream-poll-options">${options}</div>
      <div class="stream-poll-total">${totalVotes} vote${totalVotes === 1 ? '' : 's'}</div>
    </div>`;
}

function renderStreamAttachments(message) {
  const attachments = (message?.attachments || []).filter((attachment) => attachment?.type !== 'portal_poll');
  if (!attachments.length) return '';
  return `
    <div class="stream-attachments">
      ${attachments.map((attachment) => {
        const url = attachment.asset_url || attachment.image_url || attachment.thumb_url || attachment.title_link || attachment.og_scrape_url || '';
        const title = attachment.title || attachment.name || attachment.fallback || 'Attachment';
        if (attachment.type === 'image' && url) {
          return `<a class="stream-image-attachment" href="${escapeAttr(url)}" target="_blank" rel="noopener"><img src="${escapeAttr(url)}" alt="${escapeAttr(title)}" /></a>`;
        }
        return `<a class="stream-file-attachment" href="${escapeAttr(url)}" target="_blank" rel="noopener">${title}</a>`;
      }).join('')}
    </div>`;
}

function renderStreamReactionBar(message) {
  const options = [
    { type: 'love', label: '❤️' },
    { type: 'like', label: '👍' },
    { type: 'fire', label: '🔥' },
    { type: 'smile', label: '😄' },
  ];
  return `
    <div class="stream-reaction-row">
      ${options.map((option) => `<button class="stream-reaction-btn ${hasOwnStreamReaction(message, option.type) ? 'active' : ''}" onclick="toggleStreamReaction('${escapeAttr(message.id)}','${option.type}')">${option.label}</button>`).join('')}
    </div>`;
}

function openStreamMessageContext(messageId, mode, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  if (!messageId) return;
  const sameMessage = STREAM_STATE.contextMenu?.messageId === messageId;
  const currentMode = sameMessage ? STREAM_STATE.contextMenu?.mode : '';
  const nextMode = currentMode === mode ? '' : mode;
  STREAM_STATE.contextMenu = nextMode ? { messageId, mode: nextMode } : { messageId: '', mode: '' };
  renderStreamActiveChannel();
}

function handleStreamMessageContext(messageId, event) {
  openStreamMessageContext(messageId, 'reactions', event);
}

function handleStreamMessageDeleteContext(messageId, event) {
  openStreamMessageContext(messageId, 'delete', event);
}

async function ensureStreamMessagingClient() {
  if (!canAccessStreamMessaging()) {
    throw new Error('Stream messaging is available only for internal users.');
  }
  const StreamChatCtor = await loadStreamSdk();
  if (!StreamChatCtor) {
    throw new Error('Stream Chat SDK failed to load.');
  }
  if (STREAM_STATE.client && STREAM_STATE.auth) {
    return STREAM_STATE.client;
  }

  const auth = await API.getStreamAuth();
  const apiKey = auth.apiKey || window.APP_CONFIG?.streamApiKey || '';
  if (!apiKey) {
    throw new Error('Stream API key is not configured.');
  }

  const client = StreamChatCtor.getInstance ? StreamChatCtor.getInstance(apiKey) : new StreamChatCtor(apiKey);
  await client.connectUser(auth.user, auth.token);
  STREAM_STATE.client = client;
  STREAM_STATE.auth = auth;
  if (STREAM_STATE.unsubscribe && typeof STREAM_STATE.unsubscribe.unsubscribe === 'function') {
    try { STREAM_STATE.unsubscribe.unsubscribe(); } catch {}
  }
  STREAM_STATE.unsubscribe = client.on((event) => {
    if (CURRENT_PAGE !== 'stream') return;
    if (['message.new', 'notification.message_new', 'channel.updated', 'channel.deleted', 'notification.added_to_channel', 'message.updated', 'message.deleted', 'reaction.new', 'reaction.deleted', 'message.read', 'channel.truncated'].includes(event.type)) {
      refreshStreamChannelList(false);
    }
    if (STREAM_STATE.activeChannel && event.cid === STREAM_STATE.activeChannel.cid && ['typing.start', 'typing.stop'].includes(event.type)) {
      const typingLabel = Object.values(STREAM_STATE.activeChannel.state?.typing || {})
        .filter((entry) => entry?.user?.id && entry.user.id !== STREAM_STATE.auth?.user?.id)
        .map((entry) => entry.user?.name || entry.user?.email || 'User')
        .join(', ');
      const labelNode = document.getElementById('stream-typing-label');
      if (labelNode) {
        labelNode.textContent = typingLabel ? `${typingLabel} typing…` : '';
      }
    }
    if (STREAM_STATE.activeChannel && event.cid === STREAM_STATE.activeChannel.cid && !['typing.start', 'typing.stop'].includes(event.type)) {
      renderStreamActiveChannel();
    }
  });
  return client;
}

function getInternalStreamCandidates() {
  const selfEmail = String(SESSION?.email || '').toLowerCase();
  return (USER_LOOKUP_CACHE || [])
    .filter((user) => String(user.EMAIL || '').toLowerCase() !== selfEmail)
    .filter((user) => isInternalUserRole(user.ROLE || '') || getEffectiveRoleList(user).some((role) => ['Super Admin', 'Admin', 'Galvanizer', 'Staff', 'Attorney'].includes(role)))
    .sort((a, b) => String(a.FULL_NAME || a.EMAIL || '').localeCompare(String(b.FULL_NAME || b.EMAIL || ''), undefined, { sensitivity: 'base' }));
}

function buildStreamUserIdForDirectory(user) {
  if (user?.USER_ID) return `user_${String(user.USER_ID).replace(/[^A-Za-z0-9_-]/g, '_')}`;
  return `email_${String(user?.EMAIL || '').toLowerCase().replace(/[^a-z0-9_-]/g, '_')}`;
}

async function refreshStreamChannelList(keepSelection = true) {
  const client = await ensureStreamMessagingClient();
  const userId = STREAM_STATE.auth?.user?.id;
  const channels = await client.queryChannels(
    { type: 'messaging', members: { $in: [userId] } },
    { last_message_at: -1 },
    { watch: true, state: true, limit: 30 }
  );
  const previousCid = keepSelection ? STREAM_STATE.activeChannel?.cid : '';
  STREAM_STATE.channels = channels || [];
  if (previousCid) {
    STREAM_STATE.activeChannel = STREAM_STATE.channels.find((channel) => channel.cid === previousCid) || STREAM_STATE.activeChannel;
  }
  if (!STREAM_STATE.activeChannel && STREAM_STATE.channels.length) {
    STREAM_STATE.activeChannel = STREAM_STATE.channels[0];
  }
  renderStreamChannelList();
  renderStreamActiveChannel();
}

function renderStreamChannelList() {
  const target = document.getElementById('stream-channel-list');
  if (!target) return;
  const rows = (STREAM_STATE.channels || []).map((channel) => {
    const meta = getStreamChannelMeta(channel);
    const subtitle = meta.typingUsers.length
      ? `${meta.typingUsers.map((entry) => entry.user?.name || entry.user?.email || 'User').join(', ')} typing…`
      : (meta.lastMessage?.text || (meta.lastMessage?.attachments?.some((attachment) => attachment?.type === 'portal_poll') ? 'Poll' : 'No messages yet.'));
    const unreadCount = Number(channel?.countUnread?.() || channel?.state?.unreadCount || 0);
    return `
      <button class="chat-list-item ${STREAM_STATE.activeChannel?.cid === channel.cid ? 'active' : ''}" onclick="openStreamChannel('${escapeAttr(channel.cid)}')">
        <div class="chat-avatar">${String(meta.title || 'U').slice(0, 1).toUpperCase()}</div>
        <div class="chat-meta">
          <div class="chat-head">
            <div class="chat-name">${meta.title}</div>
            <div class="chat-time">${formatChatTime(meta.lastMessage?.created_at)}</div>
          </div>
          <div class="chat-preview-row">
            <div class="chat-preview">${truncateText(subtitle, 54)}</div>
            ${unreadCount ? `<span class="chat-unread">${unreadCount}</span>` : ''}
          </div>
          <div class="stream-channel-meta">
            <span class="stream-channel-pill">${meta.isGroup ? 'Group' : 'Direct'}</span>
            <span class="stream-channel-pill">${Object.keys(meta.state.members || {}).length} member${Object.keys(meta.state.members || {}).length === 1 ? '' : 's'}</span>
          </div>
        </div>
      </button>`;
  }).join('');
  target.innerHTML = rows || '<div class="empty-state"><p>No Stream conversations yet.</p></div>';
}

function renderStreamActiveChannel() {
  const target = document.getElementById('stream-active-panel');
  if (!target) return;
  const channel = STREAM_STATE.activeChannel;
  if (!channel) {
    target.innerHTML = '<div class="text-muted" style="padding:24px">Select a Stream conversation to start messaging.</div>';
    return;
  }
  const meta = getStreamChannelMeta(channel);
  const mentionTargets = getStreamMentionTargets(channel);
  const typingLabel = meta.typingUsers.length
    ? `${meta.typingUsers.map((entry) => entry.user?.name || entry.user?.email || 'User').join(', ')} typing…`
    : (meta.isGroup ? `${Object.keys(meta.state.members || {}).length} members` : (meta.otherMembers[0]?.user?.email || 'Direct stream conversation'));
  const items = meta.messages.map((message) => {
    const mine = message.user?.id === STREAM_STATE.auth?.user?.id;
    const canDelete = mine || canModerateStreamMessages();
    const readSummary = mine ? getStreamReadSummary(channel, message) : '';
    const isReactionMenuOpen = STREAM_STATE.contextMenu?.messageId === message.id && STREAM_STATE.contextMenu?.mode === 'reactions';
    const isDeleteMenuOpen = STREAM_STATE.contextMenu?.messageId === message.id && STREAM_STATE.contextMenu?.mode === 'delete';
    return `
      <div class="stream-message-row ${mine ? 'mine' : ''}">
        <div class="stream-message-card" oncontextmenu="handleStreamMessageContext('${escapeAttr(message.id)}', event)" ondblclick="handleStreamMessageDeleteContext('${escapeAttr(message.id)}', event)">
          <div class="stream-message-author">${mine ? 'You' : (message.user?.name || 'User')}</div>
          ${message.text ? `<div class="stream-message-text">${message.text}</div>` : ''}
          ${renderStreamAttachments(message)}
          ${renderStreamPoll(message)}
          ${isReactionMenuOpen ? renderStreamReactionBar(message) : ''}
          <div class="stream-message-foot">
            <span>${formatChatTime(message.created_at)}</span>
            ${readSummary ? `<span>${readSummary}</span>` : ''}
          </div>
          ${isDeleteMenuOpen && canDelete ? `<div class="stream-message-actions"><button class="btn btn-ghost btn-sm" onclick="deleteStreamMessageAction('${escapeAttr(message.id)}', ${mine ? 'true' : 'false'})">Delete</button></div>` : ''}
        </div>
      </div>`;
  }).join('');
  const pendingFileName = STREAM_STATE.pendingFile?.name ? `<span class="stream-chip">File: ${STREAM_STATE.pendingFile.name}</span>` : '';
  const pendingPollName = STREAM_STATE.pendingPoll?.question ? `<span class="stream-chip">Poll: ${STREAM_STATE.pendingPoll.question}</span>` : '';
  target.innerHTML = `
    <div class="stream-panel-inner">
      <div class="inbox-chat-head">
        <div>
          <div class="card-title" style="margin-bottom:2px">${meta.title}</div>
          <div class="text-muted" id="stream-typing-label" style="font-size:12px">${typingLabel}</div>
        </div>
        <div class="stream-header-actions">
          <button class="btn btn-ghost btn-sm" onclick="openStreamPollModal()">Poll</button>

async function sendStreamMessage() {
  const channel = STREAM_STATE.activeChannel;
  const input = document.getElementById('stream-message-input');
  const text = String(input?.value || STREAM_STATE.draftText || '').trim();
  if (!channel) return;
  const attachments = [];
  if (STREAM_STATE.pendingFile) {
    const uploaded = await channel.sendFile(STREAM_STATE.pendingFile, STREAM_STATE.pendingFile.name, STREAM_STATE.pendingFile.type);
    attachments.push({
      type: String(STREAM_STATE.pendingFile.type || '').startsWith('image/') ? 'image' : 'file',
      asset_url: uploaded.file || uploaded.file_url || uploaded.url || '',
      title: STREAM_STATE.pendingFile.name,
      mime_type: STREAM_STATE.pendingFile.type || '',
      file_size: STREAM_STATE.pendingFile.size || 0,
    });
  }
  if (STREAM_STATE.pendingPoll) {
    attachments.push({
      type: 'portal_poll',
      question: STREAM_STATE.pendingPoll.question,
      options: STREAM_STATE.pendingPoll.options,
    });
  }
  const mentionedUsers = parseStreamMentionedUsers(text, channel);
  if (!text && !attachments.length) return;
  await channel.sendMessage({
    text,
    attachments,
    mentioned_users: mentionedUsers.map((item) => item.id),
  });
  if (input) input.value = '';
  STREAM_STATE.draftText = '';
  STREAM_STATE.pendingFile = null;
  STREAM_STATE.pendingPoll = null;
  renderStreamActiveChannel();
}

async function createStreamConversationForEmail(recipientEmail) {
  const recipient = getInternalStreamCandidates().find((user) => String(user.EMAIL || '').toLowerCase() === recipientEmail);

  const client = await ensureStreamMessagingClient();

  await API.ensureStreamUsers([{

    role: recipient.ROLE || '',

  }]);

async function voteStreamPoll(messageId, optionId) {
  const channel = STREAM_STATE.activeChannel;
  if (!channel) return;
  const reactionType = `poll_${optionId}`;
  const activeMessage = (channel.state.messages || []).find((message) => message.id === messageId);
  const existing = activeMessage?.own_reactions?.find((reaction) => String(reaction.type || '').startsWith('poll_'));
  if (existing && existing.type === reactionType) {
    await channel.deleteReaction(messageId, reactionType);
  } else {
    if (existing) {
      await channel.deleteReaction(messageId, existing.type);
    }
    await channel.sendReaction(messageId, { type: reactionType });
  }
  await openStreamChannel(channel.cid);
}

async function toggleStreamReaction(messageId, reactionType) {
  const channel = STREAM_STATE.activeChannel;
  if (!channel) return;
  const activeMessage = (channel.state.messages || []).find((message) => message.id === messageId);
  const hasOwn = activeMessage?.own_reactions?.some((reaction) => String(reaction.type || '') === reactionType);
  if (hasOwn) {
    await channel.deleteReaction(messageId, reactionType);
  } else {
    await channel.sendReaction(messageId, { type: reactionType });
  }
  await openStreamChannel(channel.cid);
}

async function openInboxChat(threadId, emailHint = '') {
  try {
    const [chats, messages] = await Promise.all([
      API.getDirectInbox(),
      API.getThreadMessages(threadId)
    ]);
    const chat = (chats || []).find(item => item.THREAD_ID === threadId);
    await API.markThreadRead(threadId);
    document.querySelectorAll('.chat-list-item').forEach((item) => {
      const match = item.dataset.threadId === threadId || (emailHint && String(item.dataset.userEmail || '').toLowerCase() === String(emailHint || '').toLowerCase()) || (chat && String(item.dataset.userEmail || '').toLowerCase() === String(chat.counterpartEmail || '').toLowerCase());
      item.classList.toggle('active', match);
      if (match) {
        item.dataset.threadId = threadId;
        item.classList.remove('has-unread');
        const badge = item.querySelector('.chat-unread');
        if (badge) badge.remove();
      }
    });
    const bubbles = (messages || []).map(message => {
      const mine = String(message.SENDER_EMAIL || '').toLowerCase() === String(SESSION.email || '').toLowerCase();
      return `
        <div class="chat-bubble-row ${mine ? 'mine' : 'theirs'}">
          <div class="chat-bubble ${mine ? 'mine' : 'theirs'}">
            <div class="chat-bubble-author">${mine ? 'You' : (message.SENDER_NAME || chat?.counterpartName || 'User')}</div>
            <div class="chat-bubble-text">${message.MESSAGE_TEXT || ''}</div>
            <div class="chat-bubble-time">${fmt(message.CREATED_AT)}</div>
          </div>
        </div>`;
    }).join('');
    document.getElementById('inbox-panel').innerHTML = `
      <div class="inbox-chat-head">
        <div class="chat-avatar large">${((chat && chat.counterpartName) || 'U').slice(0,1).toUpperCase()}</div>
        <div>
          <div class="card-title" style="margin-bottom:4px">${chat?.counterpartName || 'Conversation'}</div>
          <div class="text-muted">${chat?.counterpartRole || chat?.counterpartEmail || ''}</div>
        </div>
      </div>
      <div class="chat-thread">
        ${bubbles || '<div class="text-muted">No messages yet.</div>'}
      </div>
      <div class="chat-composer">
        <textarea class="form-control" id="inbox-reply" rows="3" placeholder="Type a message"></textarea>
        <div class="chat-composer-actions">
          <button class="btn btn-primary btn-sm" onclick="sendInboxReply('${threadId}')">Send</button>
        </div>
      </div>`;
    setTimeout(() => {
      const threadEl = document.querySelector('.chat-thread');
      if (threadEl) threadEl.scrollTop = threadEl.scrollHeight;
    }, 0);
  } catch (e) {
    document.getElementById('inbox-panel').innerHTML = err(e.message);
  }
}

function resetCircleForm() {
  const fields = ['circle-id','circle-name','circle-description'];
  fields.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
}

function prefillCircleForm(circleJson) {
  const circle = JSON.parse(circleJson);
  showPage('circles');
  setTimeout(() => {
    document.getElementById('circle-id').value = circle.CIRCLE_ID || '';
    document.getElementById('circle-name').value = circle.CIRCLE_NAME || '';
    document.getElementById('circle-description').value = circle.DESCRIPTION || '';
  }, 50);
}

async function saveCircleForm() {
  const circleId = document.getElementById('circle-id')?.value.trim();
  const name = document.getElementById('circle-name')?.value.trim();
  const description = document.getElementById('circle-description')?.value.trim() || '';
  if (!name) return;
  await API.saveCircle({ CIRCLE_ID: circleId || undefined, CIRCLE_NAME: name, DESCRIPTION: description, STATUS: 'Active' });
  await populateCircleNav();
  loadCircles();
}

async function deactivateCircle(circleId) {
  if (!confirm(`Deactivate circle ${circleId}?`)) return;
  await API.deleteCircle(circleId);
  await populateCircleNav();
  loadCircles();
}

async function addCircleMember(circleId) {
  const userEmail = document.getElementById('circle-user-email').value.trim();

  await API.saveCircleMember({ CIRCLE_ID: circleId, USER_EMAIL: userEmail, ROLE_IN_CIRCLE: roleInCircle });

  loadCircles(JSON.stringify({ CIRCLE_ID: circleId, CIRCLE_NAME: '' }));

async function saveExpenseClaim() {

  const file = document.getElementById('ex-bill-file')?.files?.[0];
  if (file) {
    const dataUrl = await fileToDataUrl(file);
    const upload = await API.uploadExpenseBill({
      fileName: file.name,
      mimeType: file.type,
      dataUrl
    });
    billLink = upload.fileUrl || billLink;

  await API.submitExpenseClaim({
    claimDate: document.getElementById('ex-date').value,
    category: document.getElementById('ex-cat').value.trim(),
    amount: document.getElementById('ex-amt').value,
    billLink,

  });
  loadExpenses();
}

async function submitContact() {
  const subject = document.getElementById('ct-subject').value.trim();
  const caseId = document.getElementById('ct-case').value.trim();
  const message = document.getElementById('ct-message').value.trim();
  const status = document.getElementById('ct-status');
  if (!subject || !message) { status.innerHTML = '<div class="alert alert-error">Please fill subject and message.</div>'; return; }
  try {
    const r = await API.submitContact(subject, caseId, message);
    status.innerHTML = `<div class="alert alert-success">${r.message}</div>`;
    document.getElementById('ct-subject').value = '';
    document.getElementById('ct-case').value = '';
    document.getElementById('ct-message').value = '';
  } catch(e) { status.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
}

function syncClientCodeSelection() {
  const input = document.getElementById('mc-client-code');
  const help = document.getElementById('mc-client-help');
  const client = resolveClientByCode(input.value);
  if (client) {
    help.textContent = `${client.CLIENT_NAME || ''} | ${client.CLIENT_TYPE || 'Client'} | ${client.CLIENT_REGION || ''}`;
  } else {
    help.textContent = 'Select a valid client code from the list.';

function normalizeCaseWorkflowStageForSave(status, stage) {
  const derived = deriveWorkflowStageFromStatus(status, stage);
  if (!stage || stage === 'Drafting' || stage === 'Filed' || stage === 'Under Examination' || stage === 'Granted' || stage === 'Closed') {
    return derived;
  }
  return stage;
}

  const data = {

function updateClientCodePreview() {
  const base = String(document.getElementById('cl-code-base')?.value || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '').replace(/[MY]$/,'');
  const region = document.getElementById('cl-region')?.value || 'India';
  const suffix = region === 'Abroad' ? 'Y' : 'M';
  const finalCode = base ? `${base}${suffix}` : '';
  const out = document.getElementById('cl-code');
  if (out) out.value = finalCode;
}

async function saveUser(existingId) {
  const btn = document.getElementById('mu-save');
  btn.disabled = true; btn.textContent = 'Saving…';
  const data = {
    USER_ID: existingId || undefined,
    FULL_NAME: document.getElementById('mu-name').value.trim(),
    EMAIL: document.getElementById('mu-email').value.trim(),
    PASSWORD: document.getElementById('mu-pwd').value,
    ROLE: document.getElementById('mu-role').value,
    CLIENT_ID: document.getElementById('mu-cid').value.trim(),
    ORG_ID: resolveOrganization(document.getElementById('mu-org').value.trim())?.ORG_ID || '',
    DEPARTMENT: document.getElementById('mu-dept').value.trim(),
    CAN_VIEW_FINANCE: document.getElementById('mu-finance').value,
    REPORTS_TO: document.getElementById('mu-reports').value.trim(),
    ADDITIONAL_ROLES: getSelectedAdditionalRoles(),
  };
  const primaryCircle = document.getElementById('mu-circle')?.value.trim();
  if (!existingId) delete data.USER_ID;
  try {

  }
}

function syncInvoiceClientSelection() {
  const client = resolveClientByCode(document.getElementById('mi-client-code')?.value.trim() || '');

    document.getElementById('mi-client-name').value = client.CLIENT_NAME || '';
  }

function getInvoiceNumberInputValue(id) {
  return parseFloat(document.getElementById(id)?.value || 0) || 0;
}

function roundInvoiceAmount(value) {
  return Math.round((parseFloat(value || 0) || 0) * 100) / 100;
}

function refreshInvoiceCalculatedFields() {
  const taxType = document.getElementById('mi-tax-type')?.value || 'CGST_SGST';
  const poFee = getInvoiceNumberInputValue('mi-pofee');
  const servFee = getInvoiceNumberInputValue('mi-servfee');
  const taxableBase = roundInvoiceAmount(servFee);
  const igst = taxType === 'IGST' ? roundInvoiceAmount(taxableBase * 0.18) : 0;
  const sgst = taxType === 'IGST' ? 0 : roundInvoiceAmount(taxableBase * 0.09);
  const cgst = taxType === 'IGST' ? 0 : roundInvoiceAmount(taxableBase * 0.09);
  const igstField = document.getElementById('mi-igst');
  const sgstField = document.getElementById('mi-sgst');
  const cgstField = document.getElementById('mi-cgst');
  if (igstField) igstField.value = igst.toFixed(2);
  if (sgstField) sgstField.value = sgst.toFixed(2);
  if (cgstField) cgstField.value = cgst.toFixed(2);
  const invAmount = roundInvoiceAmount(
    poFee +
    servFee +
    igst +
    sgst +
    cgst +
    getInvoiceNumberInputValue('mi-expenses')
  );
  const netRevenue = getInvoiceNumberInputValue('mi-servfee') -
    getInvoiceNumberInputValue('mi-attorney-fee') -
    getInvoiceNumberInputValue('mi-consultant-fee') -
    getInvoiceNumberInputValue('mi-referral-fee');
  const paymentStatus = document.getElementById('mi-payment-status')?.value || 'Unpaid';
  const paymentAmountRow = document.getElementById('mi-payment-amount-row');
  const paymentAmount = getInvoiceNumberInputValue('mi-payment-amount');
  if (paymentAmountRow) paymentAmountRow.style.display = paymentStatus === 'Partially Paid' ? 'flex' : 'none';
  const amountDue = paymentStatus === 'Paid'
    ? 0
    : (paymentStatus === 'Partially Paid' ? Math.max(invAmount - paymentAmount, 0) : invAmount);
  const amountField = document.getElementById('mi-inv-amount');
  const dueField = document.getElementById('mi-amount-due');
  const revenueField = document.getElementById('mi-net-revenue');
  if (amountField) amountField.value = invAmount.toFixed(2);
  if (dueField) dueField.value = amountDue.toFixed(2);
  if (revenueField) revenueField.value = netRevenue.toFixed(2);
}

async function saveInvoice(existingId) {
  const btn = document.getElementById('mi-save');
  btn.disabled = true; btn.textContent = 'Saving…';
  const selectedClient = resolveClientByCode(document.getElementById('mi-client-code').value.trim());
  if (!selectedClient) {
    alert('Select a valid client code.');
    btn.disabled = false; btn.textContent = 'Save Invoice';
    return;
  }
  refreshInvoiceCalculatedFields();
  const data = {

async function previewBulkImportFile() {
  const input = document.getElementById('bulk-import-file');
  const file = input?.files?.[0];
  if (!file) return;
  try {
    updateBulkImportProgress(10, 'Reading Excel file...');
    const parsed = await parseDocketTrakWorkbook(file);
    CASE_IMPORT_STATE = parsed;
    const details = `
      <div class="import-summary-grid">
        <span><strong>File:</strong> ${parsed.fileName}</span>
        <span><strong>Rows Found:</strong> ${parsed.parsedRows.length}</span>
        <span><strong>Patent Rows:</strong> ${parsed.patentCount}</span>
        <span><strong>Trademark Rows:</strong> ${parsed.trademarkCount}</span>
        <span><strong>Skipped:</strong> ${parsed.skippedRows.length}</span>
      </div>
      ${parsed.skippedRows.length ? `<div style="margin-top:8px">Skipped rows are missing title or have unsupported record type.</div>` : ''}
    `;
    document.getElementById('bulk-import-summary').innerHTML = details;
    updateBulkImportProgress(25, 'File parsed. Ready to import.', `Importable rows: ${parsed.importableRows.length}`);
  } catch (e) {
    CASE_IMPORT_STATE = { parsedRows: [], importableRows: [], skippedRows: [], fileName: '' };
    document.getElementById('bulk-import-summary').innerHTML = `<span class="text-danger">${e.message}</span>`;
    updateBulkImportProgress(0, 'Import preview failed.', '');
  }
}

async function submitBulkDocketTrakImport() {
  const clientCode = document.getElementById('bulk-import-client')?.value.trim().toUpperCase() || '';
  const submitBtn = document.getElementById('bulk-import-submit');
  const selectedClient = resolveClientByCode(clientCode);
  if (!selectedClient) {
    alert('Select a valid existing client code first.');
    return;
  }
  if (!CASE_IMPORT_STATE.importableRows.length) {
    alert('Upload a valid DocketTrak Excel file first.');
    return;
  }

  const batchSize = 25;
  let imported = 0;
  let skipped = CASE_IMPORT_STATE.skippedRows.length;
  let failed = 0;
  let errorSamples = [];
  submitBtn.disabled = true;
  submitBtn.textContent = 'Importing...';

  try {
    const total = CASE_IMPORT_STATE.importableRows.length;
    for (let offset = 0; offset < total; offset += batchSize) {
      const batch = CASE_IMPORT_STATE.importableRows.slice(offset, offset + batchSize);
      updateBulkImportProgress(
        Math.round((offset / total) * 100),
        `Importing rows ${offset + 1}-${Math.min(offset + batch.length, total)} of ${total}...`,
        `Imported: ${imported} | Skipped: ${skipped} | Failed: ${failed}`
      );
      const result = await API.bulkImportDocketTrakRows({
        clientCode: selectedClient.CLIENT_CODE || selectedClient.CLIENT_ID,
        rows: batch
      });
      imported += Number(result.imported || 0);
      skipped += Number(result.skipped || 0);
      const batchErrors = Array.isArray(result.errors) ? result.errors : [];
      failed += batchErrors.length;
      errorSamples = errorSamples.concat(batchErrors).slice(0, 10);
      updateBulkImportProgress(
        Math.round((Math.min(offset + batch.length, total) / total) * 100),
        `Imported ${Math.min(offset + batch.length, total)} of ${total} rows...`,
        `Imported: ${imported} | Skipped: ${skipped} | Failed: ${failed}`
      );
    }
    const errorHtml = errorSamples.length
      ? `<div style="margin-top:8px"><strong>Sample issues:</strong><br>${errorSamples.map(item => `Row ${item.rowNumber}: ${item.reason}`).join('<br>')}</div>`
      : '';
    updateBulkImportProgress(100, 'Bulk import completed.', `Imported: ${imported} | Skipped: ${skipped} | Failed: ${failed}${errorHtml}`);
    document.getElementById('bulk-import-summary').innerHTML = `
      <div class="alert alert-success">
        Import complete for client <strong>${selectedClient.CLIENT_CODE || selectedClient.CLIENT_ID}</strong>.
        Imported ${imported} row(s), skipped ${skipped}, failed ${failed}.
      </div>`;
    await ensureClientLookupLoaded();
    await loadCases();
    await loadDashboard();
  } catch (e) {
    updateBulkImportProgress(0, 'Bulk import failed.', e.message);
    alert('Bulk import failed: ' + e.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Start Import';
  }
}
